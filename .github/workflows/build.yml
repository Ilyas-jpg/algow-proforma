name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore AlgowProforma.sln

      - name: Build (Release)
        run: dotnet build AlgowProforma.sln -c Release --no-restore

      - name: Smoke test — teklif PDF üretimi (--test-quote)
        shell: pwsh
        run: |
          dotnet run --project AlgowProforma/AlgowProforma.csproj -c Release --no-build -- --test-quote
          $pdf = Join-Path ([Environment]::GetFolderPath('Desktop')) 'algow-teklif-ornek.pdf'
          if (-not (Test-Path $pdf)) { Write-Error 'Teklif PDF uretilemedi (--test-quote)'; exit 1 }
          Write-Host "OK: teklif PDF uretildi ($((Get-Item $pdf).Length) bytes)"
